<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>정보 수정 - H&R SHOP</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background: #f9f9f9;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #800020;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: #800020;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>내 정보 수정</h2>
        <form method="POST">
            <div class="form-group">
                <label>성별</label>
                <select name="gender">
                    <option value="남" {{ 'selected' if user.gender=='남' }}>남성</option>
                    <option value="여" {{ 'selected' if user.gender=='여' }}>여성</option>
                </select>
            </div>
            <div class="form-group">
                <label>키 (cm)</label>
                <input type="number" name="height" value="{{ user.height }}">
            </div>
            <div class="form-group">
                <label>몸무게 (kg)</label>
                <input type="number" name="weight" value="{{ user.weight }}">
            </div>
            <div class="form-group">
                <label>선호하는 핏</label>
                <select name="preferred_fit">
                    <option value="정핏" {{ 'selected' if user.preferred_fit=='정핏' }}>정핏</option>
                    <option value="세미오버핏" {{ 'selected' if user.preferred_fit=='세미오버핏' }}>세미오버핏</option>
                    <option value="오버핏" {{ 'selected' if user.preferred_fit=='오버핏' }}>오버핏</option>
                </select>
            </div>
            <div class="form-group">
                <label>평소 사이즈</label>
                <input type="text" name="usual_size" value="{{ user.usual_size }}" placeholder="예: M, L, 270">
            </div>
            <button type="submit" class="btn-save">수정 완료</button>
            <a href="/mypage" class="btn-cancel">취소하고 돌아가기</a>
        </form>
    </div>
</body>

</html>
